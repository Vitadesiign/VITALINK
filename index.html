<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITA - Links</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/pr1FJMCg/vita-logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #1F1F1F;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 16px;
            position: relative;
            overflow: hidden;
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background-color: #1F1F1F;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-screen .card {
            --bg-color: #1F1F1F;
            background-color: var(--bg-color);
            padding: 1rem 2rem;
            border-radius: 1.25rem;
            border: 1px solid rgba(214,245,39,0.1);
            position: relative;
        }

        .loading-screen .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 1.25rem;
            background: radial-gradient(ellipse at center, rgba(214,245,39,0.08) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        .loading-screen .loader {
            color: rgb(124, 124, 124);
            font-family: "Poppins", sans-serif;
            font-weight: 500;
            font-size: 25px;
            box-sizing: content-box;
            height: 40px;
            padding: 10px 10px;
            display: flex;
            align-items: center;
            border-radius: 8px;
            direction: ltr;
        }

        .loading-screen .words {
            overflow: hidden;
            position: relative;
            height: 40px;
        }

        .loading-screen .words::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                var(--bg-color) 10%,
                transparent 30%,
                transparent 70%,
                var(--bg-color) 90%
            );
            z-index: 20;
        }

        .loading-screen .word {
            display: block;
            height: 40px;
            line-height: 40px;
            padding-left: 6px;
            color: #D6F527;
            animation: spin_4991 4s infinite;
        }

        @keyframes spin_4991 {
            10% { transform: translateY(-102%); }
            25% { transform: translateY(-100%); }
            35% { transform: translateY(-202%); }
            50% { transform: translateY(-200%); }
            60% { transform: translateY(-302%); }
            75% { transform: translateY(-300%); }
            85% { transform: translateY(-402%); }
            100% { transform: translateY(-400%); }
        }

        .loading-bar-track {
            width: 200px;
            height: 2px;
            background: rgba(214,245,39,0.1);
            border-radius: 2px;
            margin: 16px auto 0;
            overflow: hidden;
        }

        .loading-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #D6F527, #e8ff6e);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            opacity: 0;
            transition: opacity 0.6s ease 0.2s;
        }

        .main-content.visible {
            opacity: 1;
        }

        .bg-glow {
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(214,245,39,0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow-2 {
            position: fixed;
            bottom: -300px;
            right: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(214,245,39,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 448px;
            position: relative;
            z-index: 10;
        }

        .name-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.5s ease 0.1s forwards;
            animation-play-state: paused;
        }

        .name-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .name-text {
            font-size: 30px;
            font-weight: 600;
            color: #f4f4f5;
            letter-spacing: -0.025em;
        }

        .dot-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 10px;
            height: 10px;
        }

        .dot-static {
            width: 8px;
            height: 8px;
            background-color: #D6F527;
            border-radius: 50%;
        }

        .dot-pulse {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #D6F527;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            cursor: pointer;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation-play-state: paused;
        }

        .link-btn:nth-child(1) { animation: fadeUp 0.5s ease 0.15s forwards; }
        .link-btn:nth-child(2) { animation: fadeUp 0.5s ease 0.25s forwards; }
        .link-btn:nth-child(3) { animation: fadeUp 0.5s ease 0.35s forwards; }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(214,245,39,0.06), transparent);
            transition: left 0.5s ease;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            border-color: rgba(214,245,39,0.35);
            transform: translateY(-2px) !important;
            box-shadow: 0 8px 25px -5px rgba(214,245,39,0.1);
        }

        .link-btn:active {
            transform: translateY(0) !important;
        }

        .icon-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .link-btn:hover .icon-box {
            background-color: rgba(214,245,39,0.12);
            border-color: rgba(214,245,39,0.2);
        }

        .icon-box svg {
            width: 20px;
            height: 20px;
            color: #D6F527;
        }

        .icon-box.whatsapp-icon svg {
            color: #25D366;
        }

        .link-btn:hover .icon-box.whatsapp-icon {
            background-color: rgba(37,211,102,0.12);
            border-color: rgba(37,211,102,0.2);
        }

        .link-info {
            flex: 1;
            min-width: 0;
        }

        .link-title {
            color: #f4f4f5;
            font-size: 14px;
            font-weight: 500;
        }

        .link-desc {
            color: #71717a;
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .arrow-icon {
            width: 16px;
            height: 16px;
            color: #52525b;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .link-btn:hover .arrow-icon {
            transform: translateX(-4px);
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(214,245,39,0.15), transparent);
            margin-bottom: 24px;
            opacity: 0;
            animation: fadeUp 0.5s ease 0.45s forwards;
            animation-play-state: paused;
        }

        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #52525b;
            font-size: 12px;
            opacity: 0;
            animation: fadeUp 0.5s ease 0.5s forwards;
            animation-play-state: paused;
        }
    </style>
</head>
<body>

    <!-- ===== LOADING SCREEN ===== -->
    <div class="loading-screen" id="loadingScreen">
        <div class="card">
            <div class="loader">
                <p>loading</p>
                <div class="words">
                    <span class="word">VITA Group</span>
                    <span class="word">Graphic Design</span>
                    <span class="word">Marketing</span>
                    <span class="word">Website Designs</span>
                    <span class="word">Moderator</span>
                </div>
            </div>
            <div class="loading-bar-track">
                <div class="loading-bar-fill" id="loadingBarFill"></div>
            </div>
        </div>
    </div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content" id="mainContent">
        <div class="bg-glow"></div>
        <div class="bg-glow-2"></div>

        <div class="container">

            <div class="name-section">
                <div class="name-row">
                    <span class="name-text">VITA</span>
                    <div class="dot-wrapper">
                        <div class="dot-static"></div>
                        <div class="dot-pulse"></div>
                    </div>
                </div>
            </div>

            <div class="links">

                        </svg>
                    </div>
                    <div class="link-info">
                        <div class="link-title">WhatsApp</div>

                    </div>
                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="7" y1="17" x2="17" y2="7"/>
                        <polyline points="7 7 17 7 17 17"/>
                    </svg>
                </a>

                <a href="https://www.facebook.com/profile.php?id=61591915976718" target="_blank" class="link-btn">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
                        </svg>
                    </div>
                    <div class="link-info">
                        <div class="link-title">Facebook</div>
                        <div class="link-desc">facebook.com/vita</div>

                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="7" y1="17" x2="17" y2="7"/>
                        <polyline points="7 7 17 7 17 17"/>
                    </svg>
                </a>

                <a href="https://www.instagram.com/vitadesiign?igsh=MTh0M2ZqZWRqZzBzNw==" target="_blank" class="link-btn">
                    <div class="icon-box">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>

                    </div>
                    <div class="link-info">
                        <div class="link-title">Instagram</div>
                        <div class="link-desc">instagram.com/vitadesiign</div>
                    </div>
                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="7" y1="17" x2="17" y2="7"/>
                        <polyline points="7 7 17 7 17 17"/>
                    </svg>
                </a>

            </div>

            <div class="divider"></div>

            <div class="footer">
                <span>© 2026 VITA</span>
            </div>

        </div>
    </div>

    <script>
        const loadingScreen = document.getElementById('loadingScreen');
        const mainContent = document.getElementById('mainContent');
        const loadingBarFill = document.getElementById('loadingBarFill');

        let progress = 0;
        const loadDuration = 2800;
        const intervalTime = 30;
        const step = 100 / (loadDuration / intervalTime);

        const progressInterval = setInterval(() => {
            progress += step;
            if (progress >= 100) {
                progress = 100;
                clearInterval(progressInterval);

                setTimeout(() => {
                    loadingScreen.classList.add('hidden');
                    mainContent.classList.add('visible');

                    document.querySelectorAll('.name-section, .link-btn, .divider, .footer').forEach(el => {
                        el.style.animationPlayState = 'running';
                    });
                }, 300);
            }
            loadingBarFill.style.width = progress + '%';
        }, intervalTime);
    </script>

</body>
</html>
